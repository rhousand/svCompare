root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -tags dev -o ./tmp/main ."
  delay = 1000
  exclude_dir = ["tmp", "vendor", "frontend"]
  exclude_regex = ["_test.go"]
  include_ext = ["go"]
  kill_delay = "0s"
  log = "build-errors.log"
  stop_on_error = false

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
